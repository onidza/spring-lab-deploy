services:
  postgres:
    image: 'postgres:18'
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: 'redis:7'
    restart: on-failure
    ports:
      - "${SPRING_REDIS_PORT:-6379}:6379"
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data

  keycloak-db:
    image: postgres:18
    container_name: keycloak-db
    labels:
      org.springframework.boot.ignore: true
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${SPRING_KL_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_KL_DATASOURCE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${SPRING_KL_DATASOURCE_USERNAME}
      KC_DB_PASSWORD: ${SPRING_KL_DATASOURCE_PASSWORD}

      KC_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      - keycloak-db

volumes:
  postgres_data:
  kafka_data:
  keycloak_db_data:

networks:
  spring-lab-net:
    external: true