services:
  nginx:
    image: nginx:stable-alpine
    container_name: spring-lab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - bff
      - keycloak
    networks:
      - spring-lab-net

  backend:
    image: spring-lab-backend:local
    build:
      context: ../spring-backend-lab
      dockerfile: Dockerfile
    container_name: spring-lab-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      - postgres
      - redis
      - kafka
      - keycloak
    expose:
      - "8080"
    networks:
      - spring-lab-net

  bff:
    image: spring-lab-bff:local
    build:
      context: ../bff
      dockerfile: Dockerfile
    container_name: spring-lab-bff
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      BFF_CLIENT_SECRET: ${BFF_CLIENT_SECRET}
    depends_on:
      - backend
      - keycloak
    expose:
      - "8082"
    networks:
      - spring-lab-net

  postgres:
    image: postgres:18
    container_name: spring-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spring_backend_lab
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    expose:
      - "5432"
    networks:
      - spring-lab-net

  redis:
    image: redis:7
    container_name: spring-lab-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - spring-lab-net

  kafka:
    image: apache/kafka:4.1.1
    container_name: spring-lab-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    expose:
      - "9092"
    networks:
      - spring-lab-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak
    restart: unless-stopped
    command: start #--import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${SPRING_KL_DATASOURCE_USERNAME}
      KC_DB_PASSWORD: ${SPRING_KL_DATASOURCE_PASSWORD}

      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080

      KC_HOSTNAME: https://auth.spring-backend-lab.ru
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "true"
    depends_on:
      - keycloak-db
    expose:
      - "8080"
    networks:
      - spring-lab-net
    #volumes:
    #  - ./keycloak/import:/opt/keycloak/data/import:ro

  keycloak-db:
    image: postgres:18
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${SPRING_KL_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_KL_DATASOURCE_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql
    networks:
      - spring-lab-net

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    container_name: gitlab-runner
    restart: unless-stopped
    profiles:
      - ci
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  kafka_data:
  keycloak_db_data:
  #keycloak:
  gitlab_runner_config:

networks:
  spring-lab-net:
    name: spring-lab-net
    driver: bridge
